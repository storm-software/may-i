<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 560 512">

  <!-- Colors -->
  <defs>
    <style>
      .post { fill:#466C8F; }
      .base { fill:#184A73; }
      .dark { fill:#0E4B7A; }
      .yellow { fill:#F7BC42; }
    </style>
    <clipPath id="arm-clip">
      <rect x="-20" y="-20" width="480" height="50" rx="20"/>
    </clipPath>
  </defs>

  <!-- Gate Arm -->
  <g transform="translate(88.5 138) rotate(-15)">
    <!-- Yellow arm -->
    <rect
      x="-20"
      y="-20"
      width="480"
      height="50"
      rx="20"
      class="yellow"/>

    <!-- Blue stripes (full arm width and height) -->
    <g clip-path="url(#arm-clip)">
    <polygon class="post"
             points="-45,-20 -15,-20 -40,30 -70,30"/>
    <polygon class="post"
             points="25,-20 55,-20 30,30 0,30"/>
    <polygon class="post"
             points="95,-20 125,-20 100,30 70,30"/>
    <polygon class="post"
             points="165,-20 195,-20 170,30 140,30"/>
    <polygon class="post"
             points="235,-20 265,-20 240,30 210,30"/>
    <polygon class="post"
             points="305,-20 335,-20 310,30 280,30"/>
    <polygon class="post"
             points="375,-20 405,-20 380,30 350,30"/>
    <polygon class="post"
             points="445,-20 475,-20 450,30 420,30"/>
    </g>
    </g>

    <!-- Vertical Post -->
    <rect
      x="16.5"
      y="67"
      width="108"
      height="355"
      rx="12"
      class="post"/>

    <!-- Pivot -->
    <g transform="rotate(15 70.5 148)">
    <circle
      cx="70.5"
      cy="148"
      r="21"
      fill="#FFD88A"/>
    <g stroke="#184A73" stroke-width="3" stroke-linecap="round">
      <line x1="63.5" y1="141" x2="77.5" y2="155"/>
      <line x1="77.5" y1="141" x2="63.5" y2="155"/>
    </g>
    </g>

    <!-- Decorative Slots -->
    <rect x="30.5" y="234" width="80" height="10" rx="5" class="dark"/>
    <rect x="30.5" y="262" width="80" height="10" rx="5" class="dark"/>
    <rect x="30.5" y="290" width="80" height="10" rx="5" class="dark"/>

    <!-- Base -->
    <path class="base"
          d="
          M22 412
          H119
          C131 412 141 422 141 434
          V503
          H0
          V434
          C0 422 10 412 22 412
          Z"/>
    </svg>
